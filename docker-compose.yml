services:
  postgres:
    image: postgres:latest
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: maawan
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
  webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: webhook
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - postgres
  client-app:
    build: 
      context: .
      dockerfile: Dockerfile.client-app
    container_name: client-app
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
   